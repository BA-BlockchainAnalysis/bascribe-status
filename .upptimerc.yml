# Upptime configuration — BA | Scribe status page
owner: BA-BlockchainAnalysis
repo: bascribe-status

sites:
  - name: BAScribe
    url: https://bascribe.com
  - name: App health
    url: https://bascribe.com/api/health
  - name: API v1
    url: https://bascribe.com/api/v1/me
    expectedStatusCodes:
      - 401
  - name: Polygon RPC (anchoring)
    url: https://polygon-bor-rpc.publicnode.com
    method: POST
    body: '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}'
    headers:
      - "Content-Type: application/json"
  - name: Open-source verifier
    url: https://github.com/BA-BlockchainAnalysis/scribe-verify

status-website:
  cname: status.bascribe.com
  name: BA | Scribe Status
  introTitle: "**BA | Scribe** status"
  introMessage: Live status of BAScribe — the app, on-chain anchoring, and the open-source verifier.
  logoUrl: https://bascribe.com/email/bascribe-hex.png
  theme: dark
  navbar:
    - title: Status
      href: /
    - title: BAScribe
      href: https://bascribe.com
